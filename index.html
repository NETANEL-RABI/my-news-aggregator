<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות</title>
    <style>
        /* הגדרות כלליות */
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* כותרת עליונה */
        header { background: #007bff; color: white; padding: 15px; position: relative; text-align: center; }
        
        /* כפתור הגדרות */
        .settings-btn { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; background: none; border: none; color: white; }

        /* פריסה ראשית */
        .main-layout { display: flex; flex: 1; max-width: 1200px; margin: auto; width: 100%; gap: 15px; padding: 15px; box-sizing: border-box; }
        
        /* עמודת תוכן מרכזית */
        .content { flex: 3; background: white; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; }
        
        /* עמודת פרסומות צד */
        .ads-sidebar { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; display: flex; flex-direction: column; gap: 10px; }
        .ad-box { background: #eee; border: 1px dashed #bbb; padding: 20px; border-radius: 4px; color: #666; font-size: 0.9em; }

        /* כותרות ועיצוב חדשות */
        h1 { margin: 0; font-size: 1.5em; }
        .news-item { padding: 12px; border-bottom: 1px solid #eee; }
        .news-header { display: flex; justify-content: space-between; align-items: flex-start; }
        a { text-decoration: none; color: #333; font-weight: bold; }
        .source { color: #007bff; font-size: 0.75em; background: #e7f3ff; padding: 2px 6px; border-radius: 4px; }
        .share-btn { margin-top: 8px; background: #25d366; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* פוטר - פרסום */
        footer { background: #333; color: white; text-align: center; padding: 15px; margin-top: 20px; }
        footer a { color: #ffca28; text-decoration: underline; }

        /* התאמה לנייד */
        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .ads-sidebar { order: 2; }
        }
    </style>
</head>
<body>

    <header>
        <button class="settings-btn" onclick="openAdmin()">⚙️</button>
        <h1>צופף חדשות</h1>
    </header>

    <div class="main-layout">
        <div class="content">
            <div id="news-list"></div>
        </div>

                     <div class="ad-box">כאן תהיה פרסומת 2</div            <div class="ad-box">מקום פנוי לפרסום</d
        </aside>
    </div>

    <footer>
        רוצים לפרסם? <a href="mailto:s75247002@gmail.com?subject=פרסום באתר חדשות">לחצו כאן</a>
    </footer>

    <script>
        // פונקציית כניסה לניהול
        function openAdmin() {
            const code = prompt("נא להקיש קוד ניהול:");
            if (code === "9188") {
                alert("קוד תקין. מעביר אותך לניהול ב-GitHub...");
                window.location.href = "https://github.com/NETANEL-RABI/my-news-aggregator";
            } else {
                alert("קוד שגוי!");
            }
        }

        // שיתוף
        function shareNews(title, url) {
            if (navigator.share) {
                navigator.share({ title: title, url: url });
            } else {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(title + " " + url)}`);
            }
        }

        // טעינת חדשות
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('news-list');
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="news-header">
                            <a href="${item.link}" target="_blank">${item.title}</a>
                            <span class="source">${item.source}</span>
                        </div>
                        <button class="share-btn" onclick="shareNews('${item.title.replace(/'/g, "\\'")}', '${item.link}')">שתף</button>
                    `;
                    list.appendChild(div);
                });
            });
    </script>
</body>
</html>
