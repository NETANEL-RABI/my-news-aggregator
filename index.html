<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; background: #007bff; color: white; margin: 0; padding: 15px; font-size: 1.2em; }
        .news-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .news-item:last-child { border-bottom: none; }
        .news-item:hover { background: #f9f9f9; }
        a { text-decoration: none; color: #333; font-weight: bold; font-size: 0.95em; flex-grow: 1; margin-left: 10px; }
        .source { color: #007bff; font-size: 0.75em; background: #e7f3ff; padding: 2px 6px; border-radius: 4px; white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <h1>מבזקים אחרונים</h1>
        <div id="news-list">
            </div>
    </div>

    <script>
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('news-list');
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a> <span class="source">${item.source}</span>`;
                    list.appendChild(div);
                });
            })
            .catch(err => console.error('Error loading news:', err));
    </script>
</body>
</html>
