<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות - כתבות מלאות</title>
    <style>
        :root { --main: #004a99; --bg: #f4f7f6; --card: #ffffff; --text: #222; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: var(--main); color: white; padding: 15px; text-align: center; font-size: 1.5em; font-weight: bold; }
        
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        
        .news-card { background: var(--card); border-radius: 15px; margin-bottom: 25px; padding: 20px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .meta { font-size: 0.85em; color: #666; margin-bottom: 10px; font-weight: bold; }
        .news-title { font-size: 1.7em; font-weight: bold; margin-bottom: 15px; line-height: 1.3; color: #000; }
        
        /* כפתור ספוילר */
        .spoiler-btn { background: #f0f2f5; border: 2px solid var(--main); color: var(--main); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; transition: 0.3s; }
        .spoiler-btn:hover { background: var(--main); color: white; }
        
        /* תוכן הכתבה המלאה */
        .article-content { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; line-height: 1.8; font-size: 1.1em; white-space: pre-wrap; color: #333; }
        
        .footer-link { margin-top: 15px; display: block; color: var(--main); text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<header>צופף חדשות 🗞️</header>

<div class="container" id="news-feed">
    <div style="text-align:center; padding:50px;">טוען את הכתבות המלאות... 🔄</div>
</div>

<script>
    function toggleSpoiler(btn) {
        const content = btn.nextElementSibling;
        if (content.style.display === "block") {
            content.style.display = "none";
            btn.innerText = "📖 לכתבה המלאה (ספוילר)";
        } else {
            content.style.display = "block";
            btn.innerText = "✖️ סגור כתבה";
        }
    }

    async function loadNews() {
        const feed = document.getElementById('news-feed');
        try {
            const response = await fetch('news.json?v=' + new Date().getTime());
            const data = await response.json();
            
            if (!data.length) {
                feed.innerHTML = '<p style="text-align:center;">אין חדשות כרגע.</p>';
                return;
            }

            feed.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="meta">🕒 ${item.time} | 🔹 ${item.source}</div>
                    <div class="news-title">${item.title}</div>
                    <button class="spoiler-btn" onclick="toggleSpoiler(this)">📖 לכתבה המלאה (ספוילר)</button>
                    <div class="article-content">${item.body}
                        <a href="${item.link}" target="_blank" class="footer-link">🔗 למקור בכתבה לחץ כאן</a>
                    </div>
                `;
                feed.appendChild(card);
            });
        } catch (e) {
            feed.innerHTML = '<p style="text-align:center; color:red;">שגיאה בטעינה. וודא שהבוט סיים לרוץ.</p>';
        }
    }

    loadNews();
    setInterval(loadNews, 60000);
</script>
</body>
</html>
