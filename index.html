<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות - מערכת ניהול</title>
    <style>
        :root { --main: #007bff; --bg: #f4f4f4; --card: #fff; --text: #222; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.5; }
        
        /* עיצוב כללי */
        header { background: var(--main); color: white; padding: 1rem; text-align: center; position: relative; }
        .admin-toggle { position: absolute; top: 1rem; left: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; }

        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .news-card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        
        .news-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .time-tag { background: #eee; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .news-title { font-size: 1.3rem; font-weight: bold; margin: 0 0 10px 0; }
        
        /* תמונות במבזק */
        .news-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; margin: 10px 0; display: block; }
        
        .news-body { font-size: 1.1rem; }

        /* לוח ניהול למתחילים */
        #admin-panel { display: none; background: #fff; border: 3px solid var(--main); padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        .admin-field { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-pub { background: #28a745; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        /* תגובות */
        .react-bar { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
        .react-btn { background: #f8f9fa; border: 1px solid #ddd; border-radius: 20px; padding: 5px 15px; cursor: pointer; }

        .copy-box { background: #fffbe6; border: 1px dashed #ffe58f; padding: 10px; margin-top: 10px; display: none; font-family: monospace; font-size: 0.8rem; overflow-x: auto; }
    </style>
</head>
<body>

<header>
    <button class="admin-toggle" onclick="showAdmin()">⚙️</button>
    <h1>צופף חדשות</h1>
</header>

<div class="container">
    <div id="admin-panel">
        <h2 style="margin-top:0">הוספת מבזק חדש</h2>
        <input type="text" id="inTitle" class="admin-field" placeholder="כותרת המבזק">
        <textarea id="inBody" class="admin-field" rows="4" placeholder="תוכן המבזק..."></textarea>
        <input type="text" id="inImg" class="admin-field" placeholder="קישור לתמונה (אופציונלי)">
        
        <div style="background: #e7f3ff; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <small>💡 <b>הדרכה:</b> אחרי שתלחץ על הכפתור הירוק, יופיע קוד. תעתיק אותו, ואז ב-GitHub פשוט תדביק אותו בשורה הראשונה בתוך הסוגריים המרובעים.</small>
        </div>

        <button class="btn-pub" onclick="prepareUpdate()">הכן מבזק לפרסום</button>
        
        <div id="copyArea" class="copy-box">
            <p><b>העתק את הקוד הזה:</b></p>
            <code id="generatedJson"></code>
            <br><br>
            <button onclick="window.location.href='https://github.com/NETANEL-RABI/my-news-aggregator/edit/main/news.json'">לחץ כאן כדי לעבור להדבקה ב-GitHub</button>
        </div>
    </div>

    <div id="news-feed">טוען מבזקים...</div>
</div>

<script>
    function showAdmin() {
        const code = prompt("הכנס קוד ניהול:");
        if(code === "9188") document.getElementById('admin-panel').style.display = 'block';
    }

    // הכנת הקוד להדבקה עבור המשתמש שלא מבין בגיטהאב
    function prepareUpdate() {
        const title = document.getElementById('inTitle').value;
        const body = document.getElementById('inBody').value;
        const img = document.getElementById('inImg').value;
        const time = new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'});

        const newEntry = {
            title: title,
            body: body,
            image: img,
            time: time,
            source: "מנהל"
        };

        const jsonStr = JSON.stringify(newEntry, null, 2) + ",";
        document.getElementById('generatedJson').innerText = jsonStr;
        document.getElementById('copyArea').style.display = 'block';
        alert("הקוד נוצר! העתק אותו מהתיבה הצהובה ולחץ על הכפתור למעבר ל-GitHub");
    }

    function loadNews() {
        fetch('news.json?t=' + Date.now())
            .then(r => r.json())
            .then(data => {
                const feed = document.getElementById('news-feed');
                feed.innerHTML = '';
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.innerHTML = `
                        <div class="news-header">
                            <span class="time-tag">${item.time || 'עכשיו'}</span>
                            <span style="font-size:0.8rem; color:#666">${item.source || ''}</span>
                        </div>
                        <div class="news-title">${item.title}</div>
                        ${item.image ? `<img src="${item.image}" class="news-img" onerror="this.style.display='none'">` : ''}
                        <div class="news-body">${item.body || ''}</div>
                        <div class="react-bar">
                            <button class="react-btn" onclick="this.style.background='#d1e7dd'">🙏</button>
                            <button class="react-btn" onclick="this.style.background='#d1e7dd'">👍</button>
                            <button class="react-btn" onclick="this.style.background='#d1e7dd'">😀</button>
                        </div>
                    `;
                    feed.appendChild(card);
                });
            });
    }

    loadNews();
</script>
</body>
</html>
