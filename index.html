<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #007bff; color: white; padding: 15px; text-align: center; position: relative; }
        .settings-btn { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; background: none; border: none; color: white; }
        
        .main-layout { display: flex; max-width: 1200px; margin: auto; gap: 15px; padding: 15px; }
        .content { flex: 3; background: white; border-radius: 8px; padding: 10px; border: 1px solid #ddd; }
        
        /* פרסומת אחת בצד */
        .ads-sidebar { flex: 1; }
        #main-ad { background: #fff; border: 2px solid #ffca28; border-radius: 8px; padding: 15px; text-align: center; min-height: 200px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .news-item { padding: 15px; border-bottom: 1px solid #eee; }
        .news-header { display: flex; align-items: center; gap: 10px; }
        .news-time { font-size: 0.85em; color: #666; font-weight: bold; }
        .news-title { font-size: 1.1em; font-weight: bold; }
        .news-body { font-size: 1em; color: #444; margin: 8px 0; line-height: 1.5; white-space: pre-wrap; }

        /* שורת אימוג'ים למשתמשים */
        .user-reactions { display: flex; gap: 8px; margin-top: 10px; }
        .react-btn { background: #f8f9fa; border: 1px solid #eee; border-radius: 20px; padding: 4px 12px; cursor: pointer; font-size: 1.1em; transition: 0.2s; }
        .react-btn:hover { background: #e9ecef; }
        .react-btn.active { background: #d1e7dd; border-color: #a3cfbb; }

        .spoiler { background: #333; color: #333; cursor: pointer; padding: 0 4px; border-radius: 3px; }
        .spoiler.revealed { background: #eee; color: inherit; }

        /* לוח ניהול */
        #admin-panel { display: none; background: #fff; border: 2px solid #007bff; margin: 15px; padding: 20px; border-radius: 8px; }
        .admin-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        footer { background: #333; color: white; text-align: center; padding: 20px; }
        @media (max-width: 768px) { .main-layout { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <button class="settings-btn" onclick="checkCode()">⚙️</button>
    <h1>צופף חדשות</h1>
</header>

<div id="admin-panel">
    <h3>יצירת מבזק מפורט (9188)</h3>
    <p>השתמש בתגיות לעיצוב: <b>[B]הדגשה[/B]</b>, <span style="color:red">[COLOR=red]אדום[/COLOR]</span>, [SPOILER]ספוילר[/SPOILER]</p>
    <input type="text" id="mTitle" class="admin-input" placeholder="כותרת המבזק">
    <textarea id="mBody" class="admin-input" rows="4" placeholder="תוכן המבזק (כולל אימוג'ים שאתה מוסיף מהמקלדת שלך 😀)..."></textarea>
    
    <hr>
    <input type="text" id="adUpdate" class="admin-input" placeholder="טקסט לפרסומת הצדדית">
    
    <button onclick="publish()" style="background:#28a745; color:white; border:none; padding:12px; width:100%; cursor:pointer; font-weight:bold; border-radius:4px;">עבור לעדכון ב-GitHub</button>
</div>

<div class="main-layout">
    <div class="content" id="news-list">טוען...</div>
    <aside class="ads-sidebar">
        <div id="main-ad">כאן תופיע הפרסומת שלך</div>
    </aside>
</div>

<footer>
    רוצים לפרסם? <a href="mailto:s75247002@gmail.com" style="color:#ffc107;">לחצו כאן</a>
</footer>

<script>
    function checkCode() {
        if (prompt("קוד ניהול:") === "9188") document.getElementById('admin-panel').style.display = 'block';
    }

    function publish() {
        alert("העתק את הנתונים וערוך את הקבצים ב-GitHub.");
        window.location.href = "https://github.com/NETANEL-RABI/my-news-aggregator/edit/main/news.json";
    }

    // פונקציית תגובה למשתמש
    function handleReact(btn) {
        btn.classList.toggle('active');
        const count = btn.innerText.split(' ')[1] || 0;
        // בגלל שאין שרת, זה רק ויזואלי למשתמש כרגע
    }

    fetch('news.json')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'news-item';
                div.innerHTML = `
                    <div class="news-header">
                        <div class="news-time">${item.time || 'עכשיו'}</div>
                        <div class="news-title">${item.title}</div>
                    </div>
                    <div class="news-body">${item.body || ''}</div>
                    <div class="user-reactions">
                        <button class="react-btn" onclick="handleReact(this)">🙏</button>
                        <button class="react-btn" onclick="handleReact(this)">👍</button>
                        <button class="react-btn" onclick="handleReact(this)">👎</button>
                        <button class="react-btn" onclick="handleReact(this)">😥</button>
                        <button class="react-btn" onclick="handleReact(this)">😀</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });
</script>
</body>
</html>
