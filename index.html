<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות - ניהול תוכן עשיר</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #007bff; color: white; padding: 15px; text-align: center; position: relative; }
        .settings-btn { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; background: none; border: none; color: white; }
        
        .main-layout { display: flex; max-width: 1200px; margin: auto; gap: 15px; padding: 15px; }
        .content { flex: 3; background: white; border-radius: 8px; padding: 10px; border: 1px solid #ddd; }
        .ads-sidebar { flex: 1; }
        #main-ad { background: #fff; border: 2px solid #ffca28; border-radius: 8px; padding: 15px; text-align: center; min-height: 150px; display: flex; align-items: center; justify-content: center; }

        /* עיצוב המבזק */
        .news-item { padding: 15px; border-bottom: 1px solid #eee; }
        .news-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .news-time { font-size: 0.85em; color: #666; font-weight: bold; }
        .news-title { font-size: 1.15em; font-weight: bold; color: #333; }
        .news-body { font-size: 1em; color: #444; margin-top: 8px; line-height: 1.6; white-space: pre-wrap; }

        /* סקר */
        .poll-box { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .poll-option { display: block; background: white; border: 1px solid #ccc; padding: 5px; margin: 5px 0; border-radius: 4px; cursor: pointer; text-align: center; }
        .poll-option:hover { background: #e9ecef; }

        /* ספוילר */
        .spoiler { background: #333; color: #333; cursor: pointer; padding: 0 4px; border-radius: 3px; transition: 0.3s; }
        .spoiler.revealed { background: #eee; color: inherit; }

        /* לוח ניהול */
        #admin-panel { display: none; background: #fff; border: 2px solid #007bff; margin: 15px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .admin-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .tools { margin-bottom: 10px; display: flex; gap: 5px; flex-wrap: wrap; }
        .tool-btn { padding: 5px 10px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; }

        /* בוחר אימוג'י */
        .emoji-picker { display: none; position: absolute; background: white; border: 1px solid #ccc; padding: 10px; border-radius: 8px; z-index: 10; gap: 5px; grid-template-columns: repeat(5, 1fr); }
        .emoji-btn { font-size: 1.3em; cursor: pointer; background: none; border: none; }

        footer { background: #333; color: white; text-align: center; padding: 20px; margin-top: 20px; }
        @media (max-width: 768px) { .main-layout { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <button class="settings-btn" onclick="checkCode()">⚙️</button>
    <h1>צופף חדשות</h1>
</header>

<div id="admin-panel">
    <h3>ניהול תוכן עשיר (9188)</h3>
    <div class="tools">
        <button class="tool-btn" onclick="addTag('b')" title="מודגש"><b>B</b></button>
        <button class="tool-btn" onclick="addTag('i')" title="נטוי"><i>I</i></button>
        <input type="color" id="textColor" onchange="addColor()" title="צבע טקסט">
        <button class="tool-btn" onclick="addSpoiler()" title="ספוילר (מוסתר)">ספוילר</button>
        <button class="tool-btn" onclick="addLink()" title="קישור עם כיתוב">קישור</button>
        <button class="tool-btn" onclick="addPoll()" title="סקר">סקר</button>
        <button class="tool-btn" onclick="toggleEmojiPicker()" title="הוסף אימוג'י">😀</button>
    </div>
    
    <div class="emoji-picker" id="emojiPicker">
        <button class="emoji-btn" onclick="addEmoji('😀')">😀</button>
        <button class="emoji-btn" onclick="addEmoji('🙏')">🙏</button>
        <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
        <button class="emoji-btn" onclick="addEmoji('👎')">👎</button>
        <button class="emoji-btn" onclick="addEmoji('😥')">😥</button>
        <button class="emoji-btn" onclick="addEmoji('❗')">❗</button>
        <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
        <button class="emoji-btn" onclick="addEmoji('📢')">📢</button>
    </div>

    <input type="text" id="mabzakTitle" class="admin-input" placeholder="כותרת המבזק">
    <textarea id="mabzakBody" class="admin-input" rows="5" placeholder="תוכן המבזק (כאן העיצובים והאימוג'י יעבדו)..."></textarea>
    
    <hr>
    <p>עדכון פרסומת:</p>
    <textarea id="adInput" class="admin-input" placeholder="טקסט או HTML לפרסומת..."></textarea>
    
    <button onclick="publish()" style="background:#28a745; color:white; border:none; padding:12px; width:100%; cursor:pointer; font-weight:bold; border-radius: 4px;">פרסם מבזק</button>
</div>

<div class="main-layout">
    <div class="content" id="news-list">טוען מבזקים...</div>
    <aside class="ads-sidebar">
        <div id="main-ad">מקום לפרסומת</div>
    </aside>
</div>

<footer>
    רוצים לפרסם? <a href="mailto:s75247002@gmail.com" style="color:#ffc107;">לחצו כאן</a>
</footer>

<script>
    function checkCode() {
        if (prompt("קוד ניהול:") === "9188") document.getElementById('admin-panel').style.display = 'block';
    }

    // פונקציות עריכה
    const txt = document.getElementById('mabzakBody');
    function addTag(t) { txt.value += `<${t}>טקסט</${t}>`; }
    function addColor() { txt.value += `<span style="color:${document.getElementById('textColor').value}">טקסט בצבע</span>`; }
    function addSpoiler() { txt.value += `<span class="spoiler" onclick="this.classList.add('revealed')">טקסט מוסתר</span>`; }
    function addLink() {
        const url = prompt("כתובת האתר:");
        const label = prompt("הכיתוב שיוצג:");
        if(url && label) txt.value += `<a href="${url}" target="_blank" style="color:blue;text-decoration:underline;">${label}</a>`;
    }
    function addPoll() {
        const q = prompt("שאלה לסקר:");
        if(q) txt.value += `\n[POLL] ${q} | אפשרות 1 | אפשרות 2`;
    }

    // ניהול אימוג'י
    function toggleEmojiPicker() {
        const picker = document.getElementById('emojiPicker');
        picker.style.display = (picker.style.display === 'grid' ? 'none' : 'grid');
    }
    function addEmoji(emoji) {
        txt.value += emoji;
        document.getElementById('emojiPicker').style.display = 'none';
    }

    function publish() {
        alert("המבזק העשיר מוכן! העתק אותו וערוך את news.json.");
        window.location.href = "https://github.com/NETANEL-RABI/my-news-aggregator/edit/main/news.json";
    }

    // עיבוד תוכן המבזק (הופך סימנים לסקרים)
    function parseBody(body) {
        if (!body) return "";
        let content = body;
        
        // עיבוד סקר
        if (content.includes("[POLL]")) {
            const parts = content.split("|");
            const question = parts[0].replace("[POLL]", "").trim();
            let pollHtml = `<div class="poll-box"><strong>سקר: ${question}</strong>`;
            for (let i = 1; i < parts.length; i++) {
                pollHtml += `<div class="poll-option" onclick="alert('תודה שהצבעת!')">${parts[i].trim()}</div>`;
            }
            pollHtml += `</div>`;
            content = pollHtml;
        }
        return content;
    }

    fetch('news.json')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'news-item';
                div.innerHTML = `
                    <div class="news-header">
                        <div class="news-time">${item.time || 'עכשיו'}</div>
                        <div class="news-title">${item.title}</div>
                    </div>
                    <div class="news-body">${parseBody(item.body)}</div>
                `;
                list.appendChild(div);
            });
        });
</script>
</body>
</html>
