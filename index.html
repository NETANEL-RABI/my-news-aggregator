<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות - המערכת המלאה</title>
    <script src="https://cdn.jsdelivr.net/npm/hebcal@2.3.2/dist/hebcal.min.js"></script>
    <style>
        :root { --main: #004a99; --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --urgent: #d93025; }
        .dark-mode { --bg: #18191a; --card: #242526; --text: #e4e6eb; --border: #3e4042; }
        
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: 0.3s; }

        /* פס מידע ובורסה */
        .top-info-bar { background: #111; color: #fff; font-size: 0.8em; padding: 8px 0; display: flex; justify-content: center; gap: 25px; }
        .info-item { display: flex; gap: 5px; font-weight: bold; }
        .up { color: #4caf50; }

        header { background: var(--main); color: white; padding: 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        /* מזג אוויר בולט למעלה */
        .weather-top { background: rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 10px; text-align: center; font-weight: bold; border: 1px solid rgba(255,255,255,0.3); }

        .container { max-width: 1300px; margin: 20px auto; display: flex; gap: 20px; padding: 0 15px; }
        .feed { flex: 3; }

        /* פרסומת ענקית על כל הצד */
        .sidebar { flex: 1; min-width: 300px; }
        .ad-sticky-full { 
            position: sticky; 
            top: 110px; 
            height: 85vh; /* גובה כמעט לכל המסך */
            background: var(--card); 
            border: 4px solid #ffca28; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .ad-header { background: #ffca28; color: black; padding: 10px; font-weight: bold; text-align: center; font-size: 1.1em; }
        .ad-body { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .ad-img { max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 20px; }

        /* כרטיס מבזק */
        .news-card { background: var(--card); border-radius: 15px; margin-bottom: 25px; overflow: hidden; border: 1px solid #ddd; transition: 0.2s; }
        .news-card.urgent { border-right: 10px solid var(--urgent); border-left: 1px solid var(--urgent); }
        .card-inner { padding: 25px; }
        .news-title { font-size: 1.8em; font-weight: 800; color: var(--text); text-decoration: none; display: block; margin-bottom: 15px; line-height: 1.3; }
        .news-img { width: 100%; height: auto; border-bottom: 1px solid #eee; }

        #admin-panel { display: none; background: #fff; border: 5px solid var(--main); padding: 30px; border-radius: 20px; margin: 20px; }
        .comment-input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }

        @media (max-width: 1000px) { .container { flex-direction: column; } .sidebar { width: 100%; } .ad-sticky-full { height: auto; position: static; } }
    </style>
</head>
<body>

<div class="top-info-bar">
    <div class="info-item">💲 דולר: 3.72 <span class="up">▲</span></div>
    <div class="info-item">🕯️ כניסת שבת: 18:42</div>
    <div id="hebrew-date" class="info-item">טוען תאריך...</div>
</div>

<header>
    <div class="header-content">
        <button onclick="toggleAdmin()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">⚙️</button>
        <div style="text-align:center;">
            <h1 style="margin:0; font-size:2em;">צופף חדשות</h1>
            <span style="font-size:0.8em; opacity:0.8;">כל מה שקורה עכשיו</span>
        </div>
        <div class="weather-top" id="weather">
            ☀️ ירושלים<br>24°C
        </div>
    </div>
</header>

<div id="admin-panel">
    <h3>ניהול אתר (9188)</h3>
    <input type="text" id="admTitle" class="comment-input" placeholder="כותרת המבזק">
    <textarea id="admBody" class="comment-input" rows="3" placeholder="תוכן המבזק..."></textarea>
    <input type="text" id="admImg" class="comment-input" placeholder="קישור לתמונה">
    <label><input type="checkbox" id="admUrgent"> מבזק דחוף 🚨</label>
    <button onclick="genNews()" style="background:var(--main); color:white; border:none; padding:15px; width:100%; border-radius:10px; cursor:pointer; font-weight:bold;">צור קוד ל-GitHub</button>
    <div id="copyArea" style="display:none; margin-top:20px; background:#fffbe6; padding:10px; border:1px dashed #000;">
        <code id="finalJson" style="font-size:0.8em; word-break:break-all;"></code>
    </div>
</div>

<div class="container">
    <main class="feed" id="news-feed">טוען מבזקים...</main>
    
    <aside class="sidebar">
        <div class="ad-sticky-full">
            <div class="ad-header">פרסום בצופף חדשות</div>
            <div class="ad-body" id="ad-content">
                <img src="https://via.placeholder.com/300x500?text=Your+Ad+Here" class="ad-img" id="side-ad-img">
                <h2 id="side-ad-text">המקום שלך לפרסם כאן!</h2>
                <p>פרסום בולט על כל הצד שמגיע לכל הגולשים</p>
                <a href="mailto:s75247002@gmail.com" style="background:var(--main); color:white; padding:12px 25px; border-radius:25px; text-decoration:none; font-weight:bold;">דברו איתנו במייל</a>
            </div>
        </div>
    </aside>
</div>

<script>
    let allData = [];

    function toggleAdmin() { if(prompt("קוד ניהול:") === "9188") document.getElementById('admin-panel').style.display='block'; }
    
    function updateDate() {
        try { const now = new Hebcal.HDate(); document.getElementById('hebrew-date').innerText = now.toString('h'); }
        catch(e) { document.getElementById('hebrew-date').innerText = new Date().toLocaleDateString('he-IL'); }
    }

    function genNews() {
        const obj = {
            title: document.getElementById('admTitle').value,
            body: document.getElementById('admBody').value,
            image: document.getElementById('admImg').value,
            urgent: document.getElementById('admUrgent').checked,
            time: new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'}),
            source: "מערכת צופף"
        };
        document.getElementById('finalJson').innerText = JSON.stringify(obj, null, 2) + ",";
        document.getElementById('copyArea').style.display = 'block';
    }

    function renderNews(data) {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = '';
        data.forEach((item) => {
            if(item.type === "AD_SIDEBAR") {
                if(item.image) document.getElementById('side-ad-img').src = item.image;
                if(item.text) document.getElementById('side-ad-text').innerText = item.text;
            } else {
                const card = document.createElement('article');
                card.className = `news-card ${item.urgent ? 'urgent' : ''}`;
                card.innerHTML = `
                    ${item.image ? `<img src="${item.image}" class="news-img" onerror="this.style.display='none'">` : ''}
                    <div class="card-inner">
                        <div style="font-size:0.85em; color:#777; margin-bottom:10px;">🕒 ${item.time || ''} | ${item.source || 'מבזק'}</div>
                        <a href="${item.link || '#'}" target="_blank" class="news-title">${item.title}</a>
                        <p>${item.body || ''}</p>
                        <button onclick="window.open('https://wa.me/?text=${encodeURIComponent(item.title)}')" style="background:#25d366; color:white; border:none; padding:8px 15px; border-radius:20px; cursor:pointer; font-weight:bold;">שיתוף בוואטסאפ</button>
                    </div>
                `;
                feed.appendChild(card);
            }
        });
    }

    function loadNews() {
        fetch('news.json?v=' + Date.now()).then(r => r.text()).then(text => {
            let clean = text.trim(); if(clean.startsWith(',')) clean = clean.substring(1);
            allData = JSON.parse(clean); renderNews(allData);
        });
    }

    updateDate();
    loadNews();
    setInterval(loadNews, 60000);
</script>
</body>
</html>
