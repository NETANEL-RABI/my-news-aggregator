<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות - המערכת המלאה</title>
    <script src="https://cdn.jsdelivr.net/npm/hebcal@2.3.2/dist/hebcal.min.js"></script>
    <style>
        :root { --main: #004a99; --bg: #f0f2f5; --card: #ffffff; --text: #1c1e21; --urgent: #d93025; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }

        header { background: var(--main); color: white; padding: 15px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1300px; margin: 20px auto; display: flex; gap: 20px; padding: 0 15px; }
        .feed { flex: 3; }
        .sidebar { flex: 1; min-width: 320px; }

        /* לוח ניהול מעוצב */
        #admin-panel { display: none; background: #fff; border: 4px solid var(--main); padding: 25px; border-radius: 15px; margin: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* כרטיס מבזק */
        .news-card { background: var(--card); border-radius: 15px; margin-bottom: 25px; overflow: hidden; border: 1px solid #ddd; }
        .news-card.urgent { border-right: 12px solid var(--urgent); }
        .card-inner { padding: 20px; }
        .news-title { font-size: 1.6em; font-weight: bold; color: var(--text); text-decoration: none; display: block; margin-bottom: 10px; }
        .news-img { width: 100%; height: auto; display: block; }

        /* לייקים */
        .reactions-bar { display: flex; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        .react-btn { background: #f0f2f5; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .react-btn.active { background: #007bff; color: white; }

        /* מודעה */
        .ad-sticky { position: sticky; top: 100px; background: #fff; border: 4px solid #ffca28; border-radius: 15px; padding: 20px; text-align: center; }
        
        #copyArea { display: none; margin-top: 15px; background: #fffbe6; padding: 15px; border: 1px dashed #000; border-radius: 8px; word-break: break-all; }
    </style>
</head>
<body>

<header>
    <button onclick="toggleAdmin()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">⚙️</button>
    <h1 style="margin:0;">צופף חדשות 🗞️</h1>
    <div id="weather" style="font-weight:bold;">☀️ 24°C</div>
</header>

<div id="admin-panel">
    <h2 style="margin-top:0;">כתיבת מבזק חדש</h2>
    <input type="text" id="admTitle" class="admin-input" placeholder="כותרת המבזק (למשל: אירוע חריג בבני ברק)">
    <textarea id="admBody" class="admin-input" rows="3" placeholder="תוכן המבזק..."></textarea>
    <input type="text" id="admImg" class="admin-input" placeholder="קישור לתמונה (לא חובה)">
    <div style="margin: 10px 0;">
        <label style="cursor:pointer; font-weight:bold;"><input type="checkbox" id="admUrgent"> מבזק דחוף (פס אדום) 🚨</label>
    </div>
    <button onclick="generateNewsCode()" style="background:green; color:white; padding:15px; width:100%; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:18px;">צור קוד לפרסום</button>
    
    <div id="copyArea">
        <p style="margin-top:0; font-weight:bold; color:red;">העתק את הקוד הבא והדבק אותו בתוך ה-news.json ב-GitHub:</p>
        <code id="finalJson" style="display:block; background:#eee; padding:10px;"></code>
    </div>
</div>

<div class="container">
    <main class="feed" id="news-feed">טוען מבזקים... 🔄</main>
    
    <aside class="sidebar">
        <div class="ad-sticky">
            <h3 style="background:#ffca28; margin:-20px -20px 20px -20px; padding:10px;">פרסום בצופף 📢</h3>
            <img src="https://via.placeholder.com/250x300?text=AD" style="width:100%; border-radius:10px;">
            <p><b>רוצים להופיע כאן?</b></p>
            <a href="mailto:s75247002@gmail.com" style="background:var(--main); color:white; padding:12px; display:block; border-radius:25px; text-decoration:none; font-weight:bold;">📧 צרו קשר במייל</a>
        </div>
    </aside>
</div>

<script>
    let allData = [];

    function toggleAdmin() {
        let pass = prompt("הכנס קוד מנהל:");
        if(pass === "9188") document.getElementById('admin-panel').style.display = 'block';
    }

    // פונקציית יצירת הקוד - כאן היה התיקון
    function generateNewsCode() {
        const title = document.getElementById('admTitle').value;
        const body = document.getElementById('admBody').value;
        const img = document.getElementById('admImg').value;
        const isUrgent = document.getElementById('admUrgent').checked;

        if(!title) { alert("חובה לכתוב כותרת!"); return; }

        const newMivzak = {
            title: title,
            body: body,
            image: img,
            urgent: isUrgent,
            time: new Date().toLocaleTimeString('he-IL', {hour: '2-digit', minute:'2-digit'}),
            source: "מערכת צופף"
        };

        // הצגת הקוד להעתקה
        const jsonString = JSON.stringify(newMivzak, null, 2) + ",";
        document.getElementById('finalJson').innerText = jsonString;
        document.getElementById('copyArea').style.display = 'block';
        
        // גלילה למטה כדי לראות את הקוד
        window.scrollTo(0, document.body.scrollHeight);
    }

    function handleReaction(btn) {
        const span = btn.querySelector('.count');
        let count = parseInt(span.innerText);
        btn.classList.toggle('active');
        span.innerText = btn.classList.contains('active') ? count + 1 : count - 1;
    }

    function renderNews(data) {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = '';
        data.forEach(item => {
            const card = document.createElement('article');
            card.className = `news-card ${item.urgent ? 'urgent' : ''}`;
            
            card.innerHTML = `
                ${item.image ? `<img src="${item.image}" class="news-img" onerror="this.style.display='none'">` : ''}
                <div class="card-inner">
                    <div style="font-size:0.85em; color:#777; margin-bottom:5px;">🕒 ${item.time || ''} | ${item.source || 'מבזק'}</div>
                    <div class="news-title">${item.title}</div>
                    <p>${item.body || ''}</p>
                    <div class="reactions-bar">
                        <button class="react-btn" onclick="handleReaction(this)">👍 <span class="count">0</span></button>
                        <button class="react-btn" onclick="handleReaction(this)">❤️ <span class="count">0</span></button>
                        <button onclick="window.open('https://wa.me/?text=${encodeURIComponent(item.title)}')" style="background:none; border:none; color:#25d366; cursor:pointer; font-weight:bold; margin-right:auto;">🟢 שתף</button>
                    </div>
                </div>
            `;
            feed.appendChild(card);
        });
    }

    function loadNews() {
        fetch('news.json?v=' + Date.now())
            .then(r => r.text())
            .then(text => {
                let clean = text.trim();
                if(clean.startsWith(',')) clean = clean.substring(1);
                // עוטף במערך אם חסר
                if(!clean.startsWith('[')) clean = '[' + clean;
                if(clean.endsWith(',')) clean = clean.slice(0, -1);
                if(!clean.endsWith(']')) clean = clean + ']';
                
                allData = JSON.parse(clean);
                renderNews(allData);
            })
            .catch(e => console.error("שגיאה בטעינת החדשות:", e));
    }

    loadNews();
    setInterval(loadNews, 60000);
</script>
</body>
</html>
