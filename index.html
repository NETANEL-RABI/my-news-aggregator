<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צופף חדשות - ניהול ותגובות</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        header { background: #007bff; color: white; padding: 15px; text-align: center; position: relative; }
        .settings-btn { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; background: none; border: none; color: white; }
        
        .main-layout { display: flex; max-width: 1200px; margin: auto; gap: 15px; padding: 15px; }
        .content { flex: 3; background: white; border-radius: 8px; padding: 10px; border: 1px solid #ddd; }
        .ads-sidebar { flex: 1; background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; }
        
        .news-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .news-main { display: flex; align-items: flex-start; gap: 10px; }
        .news-time { font-size: 0.8em; color: #888; white-space: nowrap; }
        .news-title { flex-grow: 1; font-size: 1.05em; line-height: 1.4; }
        .news-title a { color: #333; text-decoration: none; font-weight: bold; }
        
        /* שורת תגובות */
        .reactions { display: flex; gap: 10px; margin-right: 45px; }
        .reaction-btn { background: #f8f9fa; border: 1px solid #eee; border-radius: 20px; padding: 2px 8px; cursor: pointer; font-size: 0.9em; transition: 0.2s; }
        .reaction-btn:hover { background: #e9ecef; }
        .reaction-btn.active { background: #d1e7dd; border-color: #a3cfbb; }

        .spoiler { background: #333; color: #333; cursor: pointer; padding: 0 4px; border-radius: 3px; }
        .spoiler.revealed { background: #eee; color: #333; }

        /* לוח ניהול */
        #admin-panel { display: none; background: #fff; border: 2px solid #007bff; margin: 15px; padding: 20px; border-radius: 8px; }
        .admin-input { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        footer { background: #333; color: white; text-align: center; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <button class="settings-btn" onclick="checkCode()">⚙️</button>
    <h1>צופף חדשות</h1>
</header>

<div id="admin-panel">
    <h3>ניהול מבזק</h3>
    <textarea id="flashText" class="admin-input" rows="3" placeholder="תוכן המבזק..."></textarea>
    <button onclick="publishFlash()" style="background: #28a745; color: white; padding: 10px; border: none; width: 100%; cursor: pointer; border-radius: 4px;">פרסם עדכון</button>
</div>

<div class="main-layout">
    <div class="content" id="news-list">טוען...</div>
    <aside class="ads-sidebar">
        <div style="color:#aaa; padding:50px 0;">פרסומת</div>
    </aside>
</div>

<footer>
    רוצים לפרסם? <a href="mailto:s75247002@gmail.com" style="color:#ffc107;">לחצו כאן</a>
</footer>

<script>
    function checkCode() {
        if (prompt("קוד ניהול:") === "9188") document.getElementById('admin-panel').style.display = 'block';
    }

    function publishFlash() {
        window.location.href = "https://github.com/NETANEL-RABI/my-news-aggregator/edit/main/news.json";
    }

    // פונקציה לטיפול בלחיצה על תגובה
    function react(btn) {
        btn.classList.toggle('active');
    }

    fetch('news.json')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('news-list');
            list.innerHTML = '';
            data.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'news-item';
                
                const titleHtml = item.link && item.link !== "#" 
                    ? `<a href="${item.link}" target="_blank">${item.title}</a>` 
                    : `<span>${item.title}</span>`;

                div.innerHTML = `
                    <div class="news-main">
                        <div class="news-time">${item.time || 'עכשיו'}</div>
                        <div class="news-title">
                            ${titleHtml}
                            <small style="color:#007bff; margin-right:5px;">[${item.source}]</small>
                        </div>
                    </div>
                    <div class="reactions">
                        <button class="reaction-btn" onclick="react(this)">🙏</button>
                        <button class="reaction-btn" onclick="react(this)">👍</button>
                        <button class="reaction-btn" onclick="react(this)">👎</button>
                        <button class="reaction-btn" onclick="react(this)">😥</button>
                        <button class="reaction-btn" onclick="react(this)">😀</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });
</script>
</body>
</html>
